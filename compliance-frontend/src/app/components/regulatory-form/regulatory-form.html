<div class="container mt-4">
  <div class="card shadow col-lg-8 mx-auto">
    <div class="card-header bg-dark text-white">
      <h3 class="mb-0">{{ isEditMode ? 'Update' : 'Register' }} Requirement</h3>
    </div>
    <div class="card-body">
      <form [formGroup]="reqForm" (ngSubmit)="onSubmit()">
        
        <div class="mb-3">
          <label class="form-label">Requirement Name</label>
          <input type="text" class="form-control" formControlName="name"
                 [class.is-invalid]="reqForm.get('name')?.invalid && reqForm.get('name')?.touched">
          <div class="invalid-feedback">A valid name is required (min 3 characters).</div>
        </div>

        <div class="mb-3">
          <label class="form-label">Description</label>
          <textarea class="form-control" formControlName="description" rows="3"></textarea>
        </div>

        <div class="row">
          <div class="col-md-6 mb-3">
            <label class="form-label">Effective Date</label>
            <input type="date" class="form-control" formControlName="effectiveDate">
          </div>
          
          <div class="col-md-6 mb-3">
            <label class="form-label">Review Frequency</label>
            <select class="form-select" formControlName="frequency">
              <option value="Annual">Annual</option>
              <option value="Semi-Annual">Semi-Annual</option>
              <option value="Quarterly">Quarterly</option>
              <option value="Monthly">Monthly</option>
              <option value="One-Time">One-Time</option>
            </select>
          </div>
        </div>

        <div class="d-flex justify-content-end gap-2 mt-4">
          <button type="button" class="btn btn-secondary" routerLink="/requirements">Cancel</button>
          <button type="submit" class="btn btn-primary" [disabled]="reqForm.invalid">
            {{ isEditMode ? 'Save Changes' : 'Register Requirement' }}
          </button>
        </div>
      </form>
    </div>
  </div>
</div>
