# 1. Database Connection (Ensure these match your pgAdmin settings)
spring.application.name=project1
spring.output.ansi.enabled=ALWAYS
spring.datasource.url=jdbc:postgresql://localhost:5432/regulatory_manager
spring.datasource.username=postgres
spring.datasource.password=AnvilofWar231!
spring.datasource.driver-class-name=org.postgresql.Driver

# 2. The "Must-Have" for PostgreSQL to run data.sql
spring.sql.init.mode=always

# 3. The "Timing" - Run SQL AFTER Hibernate creates tables
spring.jpa.defer-datasource-initialization=true
spring.jpa.hibernate.ddl-auto=update

# 4. Explicitly point to the file so Spring can't "miss" it
spring.sql.init.data-locations=classpath:data.sql

# 5. Show SQL in the logs so we can see it working
spring.jpa.show-sql=true
logging.level.org.springframework.jdbc.datasource.init=DEBUG